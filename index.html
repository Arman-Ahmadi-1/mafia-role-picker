<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تقسیم نقش مافیا</title>

  <style>
    body {
      font-family: Tahoma, Arial, sans-serif;
      padding: 20px;
      max-width: 520px;
      margin: auto;
      background: radial-gradient(circle at top, #2b0f0f, #050505 70%);
      color: white;
    }

    h1, h2, h3 { text-align: center; }

    button {
      font-size: 18px;
      padding: 13px;
      margin: 7px 0;
      width: 100%;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .citizen-btn {
      background: linear-gradient(135deg, #1f6feb, #0b3d91);
      color: white;
    }

    .mafia-btn {
      background: linear-gradient(135deg, #8b0000, #3b0000);
      color: white;
    }

    .main-btn {
      background: linear-gradient(135deg, #d4af37, #9b7500);
      color: #111;
    }

    .reveal-btn {
      background: linear-gradient(135deg, #ffd700, #b8860b);
      color: #111;
      font-size: 32px;
      font-weight: 900;
      padding: 32px;
      margin-top: 25px;
      border-radius: 26px;
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
    }

    /* NEW: safer reset button */
    .reset-btn {
      background: rgba(255,255,255,0.08);
      color: #aaa;
      font-size: 14px;
      padding: 10px;
      width: 60%;
      margin: 40px auto 0 auto;
      display: block;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .card {
      background: rgba(255,255,255,0.08);
      padding: 18px;
      border-radius: 18px;
      margin: 18px 0;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .role-card {
      min-height: 300px;
      border-radius: 24px;
      padding: 25px;
      margin: 25px 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      box-shadow: 0 0 35px rgba(0,0,0,0.8);
    }

    .role-card-mafia {
      background: linear-gradient(145deg, #3b0000, #090000);
    }

    .role-card-citizen {
      background: linear-gradient(145deg, #05254f, #050b14);
    }

    .role-icon { font-size: 60px; }
    .role-title { font-size: 42px; font-weight: bold; }
    .role-team { font-size: 20px; }

    .progress {
      text-align: center;
      color: #f1c40f;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>🎭 تقسیم نقش مافیا</h1>

<div id="setup-screen">

  <div class="card">
    <h2>ساختن دک</h2>

    <h3>تیم شهروند</h3>
    <button class="citizen-btn" onclick="addRole('شهروند','citizen')">شهروند</button>
    <button class="citizen-btn" onclick="addRole('دکتر','citizen')">دکتر</button>
    <button class="citizen-btn" onclick="addRole('کارآگاه','citizen')">کارآگاه</button>

    <h3>تیم مافیا</h3>
    <button class="mafia-btn" onclick="addRole('مافیا','mafia')">مافیا</button>
    <button class="mafia-btn" onclick="addRole('پدرخوانده','mafia')">پدرخوانده</button>
  </div>

  <div class="card">
    <h3>دک فعلی</h3>

    <h4>شهروند</h4>
    <p id="citizen-deck-list">-</p>

    <h4>مافیا</h4>
    <p id="mafia-deck-list">-</p>

    <p id="deck-count">۰</p>
  </div>

  <button class="main-btn" onclick="startGame()">شروع</button>

</div>

<div id="game-screen" style="display:none;">

  <p class="progress" id="progress"></p>

  <div id="hidden-message">
    <button class="reveal-btn" onclick="revealRole()">نمایش نقش من</button>
  </div>

  <div id="role-message" style="display:none;">
    <div id="role-card" class="role-card">
      <div id="role-icon" class="role-icon"></div>
      <div id="role-display" class="role-title"></div>
      <div id="role-team" class="role-team"></div>
    </div>

    <button class="main-btn" onclick="next()">نفر بعدی</button>
  </div>

  <!-- moved and redesigned reset button -->
  <button class="reset-btn" onclick="resetGame()">شروع دوباره</button>

</div>

<script>
let deck = [];
let shuffled = [];
let i = 0;

function toFa(n){ return n.toString().replace(/\d/g,d=>"۰۱۲۳۴۵۶۷۸۹"[d]); }

function addRole(r,t){
  deck.push({role:r,team:t});
  update();
}

function update(){
  let c = deck.filter(x=>x.team==="citizen");
  let m = deck.filter(x=>x.team==="mafia");

  document.getElementById("citizen-deck-list").innerText =
    c.map(x=>x.role).join(", ") || "-";

  document.getElementById("mafia-deck-list").innerText =
    m.map(x=>x.role).join(", ") || "-";

  document.getElementById("deck-count").innerText =
    "تعداد: "+toFa(deck.length);
}

function startGame(){
  shuffled=[...deck].sort(()=>Math.random()-0.5);
  i=0;

  document.getElementById("setup-screen").style.display="none";
  document.getElementById("game-screen").style.display="block";

  updateProgress();
}

function revealRole(){
  let r = shuffled[i];

  document.getElementById("role-display").innerText=r.role;

  if(r.team==="mafia"){
    document.getElementById("role-card").className="role-card role-card-mafia";
    document.getElementById("role-icon").innerText="💀🔫";
    document.getElementById("role-team").innerText="مافیا";
  }else{
    document.getElementById("role-card").className="role-card role-card-citizen";
    document.getElementById("role-icon").innerText="🛡️🏠";
    document.getElementById("role-team").innerText="شهروند";
  }

  document.getElementById("hidden-message").style.display="none";
  document.getElementById("role-message").style.display="block";
}

function next(){
  i++;
  if(i>=shuffled.length){
    alert("تمام شد");
    return;
  }

  document.getElementById("hidden-message").style.display="block";
  document.getElementById("role-message").style.display="none";

  updateProgress();
}

function updateProgress(){
  document.getElementById("progress").innerText =
    "بازیکن "+toFa(i+1)+" از "+toFa(shuffled.length);
}

function resetGame(){
  const confirmReset = confirm("آیا مطمئنی می‌خواهی بازی را از اول شروع کنی؟");
  if (!confirmReset) return;

  deck=[];
  shuffled=[];
  i=0;

  document.getElementById("setup-screen").style.display="block";
  document.getElementById("game-screen").style.display="none";
  document.getElementById("hidden-message").style.display="block";
  document.getElementById("role-message").style.display="none";

  update();
}
</script>

</body>
</html>
